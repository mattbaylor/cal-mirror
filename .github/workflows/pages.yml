name: Deploy Pages

# Only when the site actually changes — unrelated commits no longer redeploy.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys: GitHub Pages allows only one active deployment, so queue
# (don't cancel) to avoid the "Deployment failed, try again later" collisions.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      # GitHub's Pages backend intermittently returns "Deployment failed, try
      # again later" (throttling on frequent deploys). Retry once after a pause.
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deploy1.outcome == 'failure'
        run: echo "First deploy hit a transient Pages error; retrying in 45s." && sleep 45
      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
