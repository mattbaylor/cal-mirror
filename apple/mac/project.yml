# XcodeGen spec for the sandboxed macOS (App Store) app.
#   brew install xcodegen
#   cd apple/mac && xcodegen generate && open CalMirrorMac.xcodeproj
name: CalMirrorMac
options:
  bundleIdPrefix: io.github.mattbaylor
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  CalMirrorKit:
    path: ".."          # apple/ — the shared engine package

settings:
  base:
    SWIFT_VERSION: "5.9"
    # Set your team in Xcode (Signing & Capabilities) or here:
    # DEVELOPMENT_TEAM: XXXXXXXXXX

targets:
  CalMirrorMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - CalMirrorMac
      - ../Shared
    dependencies:
      - package: CalMirrorKit
        product: CalMirrorKit
    settings:
      base:
        PRODUCT_NAME: cal-mirror
        PRODUCT_BUNDLE_IDENTIFIER: io.github.mattbaylor.cal-mirror
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CalMirrorMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: CalMirrorMac/CalMirrorMac.entitlements
        ENABLE_APP_SANDBOX: YES
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
