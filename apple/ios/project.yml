# XcodeGen spec for the iOS/iPadOS app.
#   brew install xcodegen
#   cd apple/ios && xcodegen generate && open CalMirror.xcodeproj
name: CalMirror
options:
  bundleIdPrefix: io.github.mattbaylor
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  CalMirrorKit:
    path: ".."          # apple/ — the Swift package with the shared engine

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
    # Set your team in Xcode (Signing & Capabilities) or here:
    # DEVELOPMENT_TEAM: XXXXXXXXXX

targets:
  CalMirror:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - CalMirror
      - ../Shared
    dependencies:
      - package: CalMirrorKit
        product: CalMirrorKit
    settings:
      base:
        PRODUCT_NAME: CalMirror
        PRODUCT_BUNDLE_IDENTIFIER: io.github.mattbaylor.cal-mirror
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CalMirror/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
